<ion-header>
  <ion-toolbar color="danger">
    <ion-title>Registro UTP</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <form [formGroup]="registroForm">
    <!-- Campo Nombre -->
    <ion-item>
      <ion-label position="floating">Nombre</ion-label>
      <ion-input formControlName="nombre"></ion-input>
    </ion-item>
    <ion-note color="danger" *ngIf="f.nombre.invalid && (f.nombre.touched || enviado)">
      El nombre es obligatorio y debe tener mínimo 3 letras.
    </ion-note>

    <!-- Campo Correo -->
    <ion-item>
      <ion-label position="floating">Correo</ion-label>
      <ion-input formControlName="correo" type="email"></ion-input>
    </ion-item>
    <ion-note color="danger" *ngIf="f.correo.invalid && (f.correo.touched || enviado)">
      Ingresa un correo válido.
    </ion-note>

    <!-- Campo Tipo de app -->
    <ion-item>
      <ion-label>Tipo de app</ion-label>
      <ion-select formControlName="tipoApp">
        <ion-select-option value="academica">Académica</ion-select-option>
        <ion-select-option value="ventas">Ventas</ion-select-option>
      </ion-select>
    </ion-item>
    <ion-note color="danger" *ngIf="f.tipoApp.invalid && (f.tipoApp.touched || enviado)">
      Selecciona un tipo de app.
    </ion-note>
  </form>
  <ion-button expand="block" (click)="validarRegistro()" class="ion-margin-top">
    Enviar Registro
  </ion-button>
</ion-content>
