<ion-header>
  <ion-toolbar color="danger">
    <ion-title>Registro UTP</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <form [formGroup]="registroForm">
    <ion-item>
      <ion-label position="floating">Nombre</ion-label>
      <ion-input formControlName="nombre"></ion-input>
    </ion-item>
    <ion-button expand="block" color="danger" (click)="validarRegistro()">
      Validar registro
    </ion-button>

    <ion-button expand="block" color="danger" (click)="continuarADetalle()">
      Continuar al detalle
    </ion-button>
  </form>

  <div class="ion-margin-top">
    <ion-button expand="block" color="danger" [disabled]="cargando" (click)="guardarEnNube()">
      {{ cargando ? 'Guardando...' : 'Guardar en nube' }}
    </ion-button>
    
    <ion-button expand="block" fill="clear" (click)="limpiarFormulario()">
      Limpiar
    </ion-button>
  </div>

  <div class="ion-text-center">
    <ion-note color="success" *ngIf="mensaje">{{ mensaje }}</ion-note>
    <ion-note color="danger" *ngIf="error">{{ error }}</ion-note>
  </div>
</ion-content>
